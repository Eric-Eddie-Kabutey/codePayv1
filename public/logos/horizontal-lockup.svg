<svg viewBox="0 0 500 120" xmlns="http://www.w3.org/2000/svg" width="500" height="120">
  <!-- Icon (left side) -->
  <g id="icon">
    <!-- Main circle -->
    <circle cx="60" cy="60" r="40" fill="#3d81b4"/>

    <!-- Inner cutout -->
    <circle cx="60" cy="60" r="25" fill="white"/>

    <!-- Top accent node -->
    <circle cx="60" cy="27" r="8" fill="#14b8a6"/>

    <!-- Right accent node -->
    <circle cx="92" cy="60" r="6" fill="#14b8a6"/>

    <!-- Bottom accent node -->
    <circle cx="62" cy="90" r="5" fill="#14b8a6" opacity="0.8"/>

    <!-- Subtle lines -->
    <line x1="65" y1="32" x2="88" y2="56" stroke="#14b8a6" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>
    <line x1="88" y1="62" x2="66" y2="87" stroke="#14b8a6" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  </g>

  <!-- Wordmark (right side) -->
  <text x="120" y="75" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="42" font-weight="700" fill="#0f2849">CodePay</text>
</svg>